<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agenda de Campo</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.0.0/dist/tabler-icons.min.css">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#f0f2f5;--surface:#fff;--surface2:#f7f9fb;--border:#e2e6ea;
    --text:#1a2332;--text2:#4a5568;--text3:#8a96a3;
    --green:#22863a;--green-bg:#e6f4ea;--green-border:#b7dfbf;
    --red:#c0392b;--red-bg:#fdecea;--red-border:#f5b7b1;
    --blue:#1a6fb0;--blue-bg:#e8f1fb;--blue-border:#aacbee;
    --amber:#b7600a;--amber-bg:#fef3e2;--amber-border:#f5d08a;
    --gray:#5a6270;--gray-bg:#f0f2f5;--gray-border:#c8cdd4;
    --purple:#5b3fa0;--purple-bg:#f0ecfb;--purple-border:#c4b2ef;
    --teal:#0a7e6e;--teal-bg:#e0f5f2;--teal-border:#8dd4cb;
    --radius:10px;--radius-sm:6px;--shadow:0 1px 4px rgba(0,0,0,0.08);
  }
  body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:14px;min-height:100vh}
  .app{display:flex;flex-direction:column;min-height:100vh}
  .topbar{background:#1a2332;color:#fff;padding:0 20px;display:flex;align-items:center;gap:16px;height:52px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,0.18)}
  .topbar-logo{display:flex;align-items:center;gap:8px;font-weight:700;font-size:15px}
  .topbar-logo-icon{width:30px;height:30px;background:#2563eb;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:15px}
  .topbar-date{font-size:12px;color:#8fa3bf;margin-left:auto}
  .saving-dot{width:7px;height:7px;border-radius:50%;background:#22c55e;animation:pulse 1.2s infinite;margin-right:4px;display:inline-block}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  .nav{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;display:flex;gap:2px;overflow-x:auto}
  .nav-btn{padding:12px 14px;border:none;background:none;color:var(--text2);font-size:13px;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;display:flex;align-items:center;gap:5px;transition:color .15s}
  .nav-btn.active{color:#1a6fb0;border-bottom-color:#1a6fb0;font-weight:600}
  .nav-btn:hover{color:var(--text)}
  .main{flex:1;padding:20px;max-width:1000px;margin:0 auto;width:100%}
  .summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:20px}
  .summary-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;display:flex;flex-direction:column;gap:4px}
  .summary-num{font-size:26px;font-weight:700;line-height:1}
  .summary-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;color:var(--text3)}
  .summary-card.green .summary-num{color:var(--green)}
  .summary-card.red .summary-num{color:var(--red)}
  .summary-card.blue .summary-num{color:var(--blue)}
  .summary-card.amber .summary-num{color:var(--amber)}
  .summary-card.gray .summary-num{color:var(--gray)}
  .summary-card.purple .summary-num{color:var(--purple)}
  .filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;align-items:center}
  .filter-select{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);padding:7px 10px;font-size:13px;cursor:pointer;outline:none}
  .filter-select:focus{border-color:var(--blue)}
  .btn{border:none;border-radius:var(--radius-sm);padding:8px 14px;font-size:13px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:all .15s}
  .btn-primary{background:#1a6fb0;color:#fff}
  .btn-primary:hover{background:#1558a0}
  .btn-sm{padding:5px 10px;font-size:12px}
  .btn-ghost{background:var(--surface2);color:var(--text2);border:1px solid var(--border)}
  .btn-ghost:hover{background:var(--border);color:var(--text)}
  .btn-danger{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border)}
  .btn-success{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border)}
  .servicos-list{display:flex;flex-direction:column;gap:8px}
  .servico-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;display:flex;gap:12px;align-items:flex-start;transition:box-shadow .15s}
  .servico-card:hover{box-shadow:var(--shadow)}
  .servico-card.concluido{opacity:.75;border-left:3px solid var(--green)}
  .servico-card.problema{border-left:3px solid var(--red)}
  .servico-card.pendente{border-left:3px solid var(--amber)}
  .avatar{width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:#fff;flex-shrink:0}
  .servico-body{flex:1;min-width:0}
  .servico-top{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:4px}
  .servico-nome{font-weight:700;font-size:14px}
  .servico-id{font-size:11px;color:var(--text3);font-weight:500}
  .badge{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px}
  .badge.verde{background:var(--green-bg);color:var(--green)}
  .badge.vermelho{background:var(--red-bg);color:var(--red)}
  .badge.azul{background:var(--blue-bg);color:var(--blue)}
  .badge.amarelo{background:var(--amber-bg);color:var(--amber)}
  .badge.cinza{background:var(--gray-bg);color:var(--gray)}
  .badge.roxo{background:var(--purple-bg);color:var(--purple)}
  .badge.teal{background:var(--teal-bg);color:var(--teal)}
  .servico-info{display:flex;align-items:center;gap:14px;flex-wrap:wrap;font-size:12px;color:var(--text2);margin-bottom:3px}
  .servico-desc{font-size:12px;color:var(--text3);margin-top:2px}
  .servico-obs{font-size:12px;color:var(--amber);margin-top:2px}
  .servico-actions{display:flex;flex-direction:column;gap:4px;align-items:flex-end;flex-shrink:0}
  .history-list{margin-top:6px;padding:6px 10px;background:var(--surface2);border-radius:var(--radius-sm);display:none}
  .history-list.open{display:block}
  .history-item{font-size:11px;color:var(--text3);padding:2px 0;display:flex;gap:6px}
  .history-date{font-weight:600;color:var(--text2);min-width:52px}
  .empty{text-align:center;padding:48px 20px;color:var(--text3)}
  .empty i{font-size:40px;margin-bottom:10px;display:block}
  .empty-title{font-size:15px;font-weight:600;color:var(--text2);margin-bottom:6px}
  .modal-backdrop{position:fixed;inset:0;background:rgba(10,15,25,0.55);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px}
  .modal{background:var(--surface);border-radius:14px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,0.18)}
  .modal-header{padding:20px 22px 0;display:flex;align-items:center;justify-content:space-between}
  .modal-title{font-size:17px;font-weight:700}
  .modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:var(--text3);padding:4px;line-height:1}
  .modal-body{padding:16px 22px 22px}
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .form-group{margin-bottom:13px}
  .form-label{display:block;font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.4px;margin-bottom:5px}
  .form-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);padding:9px 11px;font-size:13px;outline:none;transition:border .15s}
  .form-input:focus{border-color:#1a6fb0}
  .form-textarea{min-height:60px;resize:vertical;font-family:inherit}
  .modal-footer{display:flex;gap:8px;padding-top:6px}
  .modal-footer .btn{flex:1;justify-content:center;padding:10px}
  .cal-header{display:flex;align-items:center;gap:10px;margin-bottom:16px}
  .cal-title{font-size:16px;font-weight:700;flex:1}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:20px}
  .cal-day-name{text-align:center;font-size:11px;font-weight:700;color:var(--text3);padding:6px 0;text-transform:uppercase}
  .cal-day{min-height:54px;border:1px solid var(--border);border-radius:var(--radius-sm);padding:5px;cursor:pointer;background:var(--surface);transition:all .15s;display:flex;flex-direction:column;gap:2px}
  .cal-day:hover{border-color:#1a6fb0;background:var(--blue-bg)}
  .cal-day.today{border-color:#1a6fb0;border-width:2px}
  .cal-day.selected{background:var(--blue-bg);border-color:#1a6fb0}
  .cal-day.other-month{opacity:.35}
  .cal-day-num{font-size:12px;font-weight:600}
  .cal-day.today .cal-day-num{color:#1a6fb0}
  .cal-dot{width:6px;height:6px;border-radius:50%;display:inline-block;margin:1px}
  .cal-detail{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-top:4px}
  .cal-detail-date{font-size:15px;font-weight:700;margin-bottom:12px;color:var(--blue)}
  .hist-func-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px}
  .hist-func-header{display:flex;align-items:center;gap:10px;margin-bottom:8px}
  .hist-func-name{font-weight:700;font-size:14px}
  .hist-func-type{font-size:11px;color:var(--text3)}
  .hist-func-item{font-size:12px;color:var(--text2);padding:4px 0;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
  .hist-func-item:last-child{border-bottom:none}
  .admin-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:14px}
  .admin-title{font-size:14px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:6px}
  .admin-list{display:flex;flex-direction:column;gap:6px;margin-bottom:10px}
  .admin-item{display:flex;align-items:center;gap:8px;padding:7px 10px;background:var(--surface2);border-radius:var(--radius-sm);font-size:13px}
  .admin-item-name{flex:1}
  .admin-item-badge{font-size:10px;padding:2px 7px;border-radius:10px;background:var(--green-bg);color:var(--green);font-weight:600}
  .admin-item-badge.inactive{background:var(--red-bg);color:var(--red)}
  .admin-add-row{display:flex;gap:8px}
  .admin-add-input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);padding:8px 10px;font-size:13px;outline:none}
  .admin-add-input:focus{border-color:#1a6fb0}
  .toast{position:fixed;bottom:20px;right:20px;padding:11px 18px;border-radius:10px;font-weight:600;font-size:13px;z-index:300;box-shadow:0 4px 16px rgba(0,0,0,0.15);animation:toastIn .25s ease}
  @keyframes toastIn{from{transform:translateY(12px);opacity:0}to{transform:translateY(0);opacity:1}}
  .toast.ok{background:#22863a;color:#fff}
  .toast.err{background:#c0392b;color:#fff}
  .confirm-box{background:var(--surface);border-radius:14px;padding:26px 24px;max-width:340px;width:100%;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,0.18)}
  .confirm-btns{display:flex;gap:8px}
  .section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px}
  .section-title{font-size:15px;font-weight:700}
  .tab-toggle{display:flex;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden;margin-bottom:12px}
  .tab-toggle-btn{flex:1;padding:7px 10px;border:none;background:transparent;font-size:12px;font-weight:600;cursor:pointer;color:var(--text2)}
  .tab-toggle-btn.active{background:#1a6fb0;color:#fff}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="topbar-logo">
      <div class="topbar-logo-icon"><i class="ti ti-building-warehouse" style="color:#fff;font-size:16px"></i></div>
      Agenda de Campo
    </div>
    <div class="topbar-date" id="topbar-date"></div>
    <div style="display:flex;align-items:center;gap:4px;font-size:11px;color:#8fa3bf" id="saving-status"></div>
  </div>
  <div class="nav">
    <button class="nav-btn active" onclick="showView('painel')" id="nav-painel"><i class="ti ti-layout-dashboard"></i> Painel</button>
    <button class="nav-btn" onclick="showView('servicos')" id="nav-servicos"><i class="ti ti-list-check"></i> Serviços</button>
    <button class="nav-btn" onclick="showView('calendario')" id="nav-calendario"><i class="ti ti-calendar"></i> Calendário</button>
    <button class="nav-btn" onclick="showView('historico')" id="nav-historico"><i class="ti ti-history"></i> Histórico</button>
    <button class="nav-btn" onclick="showView('admin')" id="nav-admin"><i class="ti ti-settings"></i> Admin</button>
  </div>
  <div class="main" id="main-content"></div>
</div>
<div class="modal-backdrop" id="modal-backdrop" style="display:none" onclick="handleBackdropClick(event)">
  <div class="modal" id="modal-box">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">Novo Serviço</div>
      <button class="modal-close" onclick="closeModal()"><i class="ti ti-x"></i></button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>
<div class="modal-backdrop" id="confirm-backdrop" style="display:none">
  <div class="confirm-box">
    <div style="font-size:38px;margin-bottom:10px">🗑️</div>
    <div style="font-size:15px;font-weight:700;margin-bottom:6px">Remover este serviço?</div>
    <div style="font-size:13px;color:var(--text3);margin-bottom:18px">Esta ação não pode ser desfeita.</div>
    <div class="confirm-btns">
      <button class="btn btn-ghost" style="flex:1;justify-content:center" onclick="closeConfirm()">Cancelar</button>
      <button class="btn btn-danger" style="flex:1;justify-content:center" id="confirm-ok-btn">Remover</button>
    </div>
  </div>
</div>
<div id="toast-container"></div>
<script>
const STORAGE_KEY='agenda_campo_v3_data';
const STORAGE_ADMIN='agenda_campo_v3_admin';
let state={
  servicos:[],
  funcionarios:['Samuel','Yuri','Fernando','Marcos','Jean','Manuel','Sula','Alice','Jabes','Ulde'],
  cidades:['Blumenau','Gaspar','Indaial','Timbó','Pomerode','Brusque','Joinville','Itajaí','Balneário Camboriú','Florianópolis'],
  tipos:['Instalação','Manutenção','Conserto','Solda','Montagem','Entrega','Visita técnica','Vidraçaria','Ferro','Alumínio','Box','Porta','Janela','Portão','Cerca','Cobertura'],
  setores:['Alumínio','Ferro','Escritório','Vidraçaria','Produção','Campo','Elétrica','Outros'],
  funcionariosInternos:['Sula','Alice','Jabes','Ulde'],
};
let currentView='painel',editingId=null,calDate=new Date(),calSelected=null;
let filterFunc='todos',filterStatus='todos',filterCidade='todos',filterData='',histDate=todayStr();
let confirmCallback=null,tipoRegistroAtual='externo';

function todayStr(){return new Date().toISOString().slice(0,10)}
function fmtDate(d){if(!d)return'-';const[y,m,dd]=d.split('-');return`${dd}/${m}/${y}`}
function fmtTS(ts){if(!ts)return'-';return new Date(ts).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})}
function genId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,5)}
const AVATAR_COLORS={Samuel:'#7c3aed',Yuri:'#0891b2',Fernando:'#059669',Marcos:'#d97706',Jean:'#dc2626',Manuel:'#db2777',Sula:'#0369a1',Alice:'#0f766e',Jabes:'#1e40af',Ulde:'#92400e'};
function avatarColor(n){return AVATAR_COLORS[n]||'#5a6270'}
function initials(n){return n?n.slice(0,2).toUpperCase():'??'}
const STATUS={
  aguardando:{label:'Aguardando',badge:'cinza'},
  em_campo:{label:'Em campo',badge:'azul'},
  em_andamento:{label:'Em andamento',badge:'teal'},
  concluido:{label:'Concluído',badge:'verde'},
  pendente:{label:'Pendente',badge:'amarelo'},
  retorno:{label:'Retorno necessário',badge:'roxo'},
  ag_material:{label:'Aguard. material',badge:'amarelo'},
  problema:{label:'Problema',badge:'vermelho'},
};
const STATUS_FLOW={aguardando:'em_campo',em_campo:'em_andamento',em_andamento:'concluido'};

function loadState(){
  try{const d=JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}');state.servicos=d.servicos||[]}catch(e){state.servicos=[]}
  try{const d=JSON.parse(localStorage.getItem(STORAGE_ADMIN)||'{}');
    if(d.funcionarios)state.funcionarios=d.funcionarios;
    if(d.cidades)state.cidades=d.cidades;
    if(d.tipos)state.tipos=d.tipos;
    if(d.setores)state.setores=d.setores;
    if(d.funcionariosInternos)state.funcionariosInternos=d.funcionariosInternos;
  }catch(e){}
}
function saveState(){
  try{localStorage.setItem(STORAGE_KEY,JSON.stringify({servicos:state.servicos}))}catch(e){showToast('Erro ao salvar','err')}
  setSaving(false);
}
function saveAdmin(){
  try{localStorage.setItem(STORAGE_ADMIN,JSON.stringify({funcionarios:state.funcionarios,cidades:state.cidades,tipos:state.tipos,setores:state.setores,funcionariosInternos:state.funcionariosInternos}))}catch(e){}
}
function setSaving(v){
  const el=document.getElementById('saving-status');
  if(v)el.innerHTML='<span class="saving-dot"></span> Salvando...';
  else el.innerHTML='';
}
function showToast(msg,tipo='ok'){
  const t=document.createElement('div');
  t.className=`toast ${tipo}`;t.textContent=msg;
  document.getElementById('toast-container').appendChild(t);
  setTimeout(()=>t.remove(),3000);
}
function showView(v){
  currentView=v;
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('nav-'+v).classList.add('active');
  render();
}
function render(){
  const el=document.getElementById('main-content');
  if(currentView==='painel')el.innerHTML=renderPainel();
  else if(currentView==='servicos')el.innerHTML=renderServicos();
  else if(currentView==='calendario')el.innerHTML=renderCalendario();
  else if(currentView==='historico')el.innerHTML=renderHistorico();
  else if(currentView==='admin')el.innerHTML=renderAdmin();
}
function renderPainel(){
  const hoje=todayStr();
  const sHoje=state.servicos.filter(s=>s.data===hoje);
  const sConcHoje=sHoje.filter(s=>s.status==='concluido').length;
  const sPend=state.servicos.filter(s=>['aguardando','em_campo','em_andamento','pendente','ag_material'].includes(s.status)).length;
  const sProb=state.servicos.filter(s=>s.status==='problema').length;
  const sAndamento=state.servicos.filter(s=>['em_campo','em_andamento'].includes(s.status)).length;
  const semana=[];
  for(let i=6;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);semana.push(d.toISOString().slice(0,10))}
  const semanaData=semana.map(d=>({d,c:state.servicos.filter(s=>s.data===d&&s.status==='concluido').length,t:state.servicos.filter(s=>s.data===d).length}));
  const maxVal=Math.max(...semanaData.map(x=>x.t),1);
  const rank={};
  const trinta=new Date();trinta.setDate(trinta.getDate()-30);
  state.servicos.filter(s=>new Date(s.data)>=trinta&&s.status==='concluido').forEach(s=>{rank[s.funcionario]=(rank[s.funcionario]||0)+1});
  const rankArr=Object.entries(rank).sort((a,b)=>b[1]-a[1]).slice(0,5);
  return`
  <div class="summary-grid">
    <div class="summary-card blue"><div class="summary-num">${sHoje.length}</div><div class="summary-label">Serviços hoje</div></div>
    <div class="summary-card green"><div class="summary-num">${sConcHoje}</div><div class="summary-label">Concluídos hoje</div></div>
    <div class="summary-card amber"><div class="summary-num">${sPend}</div><div class="summary-label">Pendentes</div></div>
    <div class="summary-card gray"><div class="summary-num">${sAndamento}</div><div class="summary-label">Em campo</div></div>
    <div class="summary-card red"><div class="summary-num">${sProb}</div><div class="summary-label">Problemas</div></div>
    <div class="summary-card purple"><div class="summary-num">${state.servicos.length}</div><div class="summary-label">Total cadastrado</div></div>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
    <div class="admin-section">
      <div class="admin-title"><i class="ti ti-chart-bar" style="color:var(--blue)"></i> Últimos 7 dias</div>
      <div style="display:flex;align-items:flex-end;gap:5px;height:80px;padding-bottom:4px">
        ${semanaData.map(x=>`<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px">
          <div style="width:100%;border-radius:4px 4px 0 0;background:#bee3f8;height:${Math.round((x.t/maxVal)*60)}px;min-height:${x.t?4:0}px;position:relative">
            <div style="position:absolute;bottom:0;left:0;right:0;background:#1a6fb0;border-radius:4px 4px 0 0;height:${Math.round((x.c/maxVal)*60)}px;min-height:${x.c?3:0}px"></div>
          </div>

function renderServicos(){

function toggleHistory(id){const el=document.getElementById('hist-'+id);if(el)el.classList.toggle('open')}
function renderCalendario(){
  const year=calDate.getFullYear(),month=calDate.getMonth();
  const first=new Date(year,month,1),last=new Date(year,month+1,0);
  const startDay=first.getDay(),days=[];
  for(let i=0;i<startDay;i++){const d=new Date(year,month,-(startDay-i-1));days.push({d,cur:false})}
  for(let i=1;i<=last.getDate();i++)days.push({d:new Date(year,month,i),cur:true});
  while(days.length%7!==0){const prev=days[days.length-1].d,nd=new Date(prev);nd.setDate(prev.getDate()+1);days.push({d:nd,cur:false})}
  const meses=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  const hoje=todayStr();
  let detail='';
  if(calSelected){
    const ds=state.servicos.filter(s=>s.data===calSelected);
    const funcsHoje={};ds.forEach(s=>{if(!funcsHoje[s.funcionario])funcsHoje[s.funcionario]=[];funcsHoje[s.funcionario].push(s)});
    detail=`<div class="cal-detail">
      <div class="cal-detail-date">${fmtDate(calSelected)}</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px">
        <span class="badge azul">${ds.length} serviços</span>
        <span class="badge verde">${ds.filter(s=>s.status==='concluido').length} concluídos</span>
        <span class="badge amarelo">${ds.filter(s=>['pendente','aguardando'].includes(s.status)).length} pendentes</span>
      </div>
      ${Object.keys(funcsHoje).length===0?'<div style="color:var(--text3)">Nenhum serviço.</div>':
        Object.entries(funcsHoje).map(([func,serv])=>`
        <div class="hist-func-card" style="margin-bottom:8px">
          <div class="hist-func-header">
            <div class="avatar" style="background:${avatarColor(func)};width:30px;height:30px;font-size:11px">${initials(func)}</div>
            <div><div class="hist-func-name">${func}</div><div class="hist-func-type">${serv.length} serviço(s)</div></div>
          </div>
          ${serv.map(s=>`<div class="hist-func-item">
            <span class="badge ${(STATUS[s.status]||STATUS.aguardando).badge}" style="font-size:10px">${(STATUS[s.status]||STATUS.aguardando).label}</span>
            ${s.tipo_registro==='interno'?`<span>Setor: ${s.setor}</span>`:`<span>${s.cliente||s.tipo||'Serviço'}</span>`}
          </div>`).join('')}
        </div>`).join('')}
    </div>`;
  }
  return`
  <div class="cal-header">
    <button class="btn btn-ghost btn-sm" onclick="calDate.setMonth(calDate.getMonth()-1);render()"><i class="ti ti-chevron-left"></i></button>
    <div class="cal-title">${meses[month]} ${year}</div>
    <button class="btn btn-ghost btn-sm" onclick="calDate.setMonth(calDate.getMonth()+1);render()"><i class="ti ti-chevron-right"></i></button>
    <button class="btn btn-ghost btn-sm" onclick="calDate=new Date();render()">Hoje</button>
  </div>
  <div class="cal-grid">
    ${['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'].map(d=>`<div class="cal-day-name">${d}</div>`).join('')}
    ${days.map(({d,cur})=>{
      const ds=d.toISOString().slice(0,10);
      const servsD=state.servicos.filter(s=>s.data===ds);
      const conc=servsD.filter(s=>s.status==='concluido').length;
      const prob=servsD.filter(s=>s.status==='problema').length;
      const pend=servsD.filter(s=>['pendente','aguardando','ag_material'].includes(s.status)).length;
      return`<div class="cal-day ${ds===hoje?'today':''} ${ds===calSelected?'selected':''} ${!cur?'other-month':''}" onclick="calSelected='${ds}';render()">
        <div class="cal-day-num">${d.getDate()}</div>
        <div style="display:flex;flex-wrap:wrap;gap:1px">
          ${conc>0?`<span class="cal-dot" style="background:var(--green)"></span>`:''}
          ${prob>0?`<span class="cal-dot" style="background:var(--red)"></span>`:''}
          ${pend>0?`<span class="cal-dot" style="background:var(--amber)"></span>`:''}
          ${servsD.length>0&&!conc&&!prob&&!pend?`<span class="cal-dot" style="background:var(--blue)"></span>`:''}
        </div>
      </div>`}).join('')}
  </div>${detail}`;
}

function salvar(){
  const isInt=tipoRegistroAtual==='interno';
  const funcionario=(isInt?document.getElementById('f-funcionario-int'):document.getElementById('f-funcionario'))?.value;
  const data=(isInt?document.getElementById('f-data-int'):document.getElementById('f-data'))?.value;
  if(!funcionario||!data){showToast('Funcionário e data obrigatórios','err');return}
  let novo;
  if(isInt){
    const setor=document.getElementById('f-setor')?.value;
    if(!setor){showToast('Selecione o setor','err');return}
    novo={funcionario,data,setor,obs:document.getElementById('f-obs-int')?.value||'',tipo_registro:'interno',tipo:'',status:'concluido'};
  }else{
    novo={funcionario,data,cliente:document.getElementById('f-cliente')?.value||'',cidade:document.getElementById('f-cidade')?.value||'',
      endereco:document.getElementById('f-endereco')?.value||'',tipo:document.getElementById('f-tipo')?.value||'',
      status:document.getElementById('f-status')?.value||'aguardando',descricao:document.getElementById('f-descricao')?.value||'',
      obs:document.getElementById('f-obs')?.value||'',tipo_registro:'externo'};
  }
  if(editingId){
    const old=state.servicos.find(s=>s.id===editingId);
    const hist=[...(old.historico||[])];
    if(old.status!==novo.status)hist.push({data:todayStr(),status:old.status});
    state.servicos=state.servicos.map(s=>s.id===editingId?{...s,...novo,historico:hist,updatedAt:Date.now()}:s);
  }else{
    state.servicos=[{...novo,id:genId(),criadoEm:Date.now(),updatedAt:Date.now(),historico:[]}, ...state.servicos];
  }
  closeModal();saveState();render();showToast(editingId?'Atualizado!':'Lançado!','ok');
}
function avancarStatus(id){
  const s=state.servicos.find(x=>x.id===id);if(!s||!STATUS_FLOW[s.status])return;
  const novoStatus=STATUS_FLOW[s.status];
  const hist=[...(s.historico||[]),{data:todayStr(),status:s.status}];
  state.servicos=state.servicos.map(x=>x.id===id?{...x,status:novoStatus,historico:hist,updatedAt:Date.now()}:x);
  saveState();render();showToast('Status avançado!','ok');
}
function mudarStatus(id,status){
  const s=state.servicos.find(x=>x.id===id);if(!s)return;
  const hist=[...(s.historico||[]),{data:todayStr(),status:s.status}];
  state.servicos=state.servicos.map(x=>x.id===id?{...x,status,historico:hist,updatedAt:Date.now()}:x);
  saveState();render();showToast('Status atualizado!','ok');
}
function askDelete(id){
  confirmCallback=()=>deletar(id);
  document.getElementById('confirm-backdrop').style.display='flex';
  document.getElementById('confirm-ok-btn').onclick=()=>{confirmCallback&&confirmCallback();closeConfirm()};
}
function deletar(id){state.servicos=state.servicos.filter(s=>s.id!==id);saveState();render();showToast('Removido.','ok')}
function closeConfirm(){document.getElementById('confirm-backdrop').style.display='none'}
function closeModal(){document.getElementById('modal-backdrop').style.display='none';editingId=null}
function handleBackdropClick(e){if(e.target===document.getElementById('modal-backdrop'))closeModal()}
function toggleInterno(nome){
  if(state.funcionariosInternos.includes(nome))state.funcionariosInternos=state.funcionariosInternos.filter(f=>f!==nome);
  else state.funcionariosInternos.push(nome);
  saveAdmin();render();
}
function removeFuncionario(nome){if(state.funcionarios.length<=1)return;state.funcionarios=state.funcionarios.filter(f=>f!==nome);state.funcionariosInternos=state.funcionariosInternos.filter(f=>f!==nome);saveAdmin();render();showToast('Removido','ok')}
function addFuncionario(){const v=document.getElementById('input-func')?.value.trim();if(!v||state.funcionarios.includes(v))return;state.funcionarios.push(v);saveAdmin();render();showToast('Adicionado','ok')}
function removeCidade(c){state.cidades=state.cidades.filter(x=>x!==c);saveAdmin();render()}
function addCidade(){const v=document.getElementById('input-cidade')?.value.trim();if(!v||state.cidades.includes(v))return;state.cidades.push(v);saveAdmin();render();showToast('Adicionado','ok')}
function removeTipo(t){state.tipos=state.tipos.filter(x=>x!==t);saveAdmin();render()}
function addTipo(){const v=document.getElementById('input-tipo')?.value.trim();if(!v||state.tipos.includes(v))return;state.tipos.push(v);saveAdmin();render();showToast('Adicionado','ok')}
function removeSetor(s){state.setores=state.setores.filter(x=>x!==s);saveAdmin();render()}
function addSetor(){const v=document.getElementById('input-setor')?.value.trim();if(!v||state.setores.includes(v))return;state.setores.push(v);saveAdmin();render();showToast('Adicionado','ok')}
document.getElementById('topbar-date').textContent=new Date().toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long',year:'numeric'});
loadState();render();
</script>
</body>
